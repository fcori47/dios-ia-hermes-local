# =============================================================================
# Override para GPU NVIDIA (modo "bundled").
#   - Windows: Docker Desktop con backend WSL2 + drivers NVIDIA.
#   - Linux:   nvidia-container-toolkit instalado.
#
# Agregá este override con -f SOLO si tenés GPU NVIDIA usable:
#
#   docker compose -f docker-compose.yml -f docker-compose.gpu.yml \
#     --profile bundled up -d ollama
#
# En macOS NO se usa: Docker no puede acceder a la GPU Metal de Apple, por eso
# en Mac Ollama corre nativo en el host (modo "host"). Ver README.
# =============================================================================

services:
  ollama:
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
