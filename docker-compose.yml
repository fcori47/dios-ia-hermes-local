# =============================================================================
# Hermes Agent + Ollama — 100% local, con Docker
# Funciona en Windows, macOS y Linux. Sin cuenta, sin nube: la inferencia
# corre entera en tu máquina vía Ollama.
#
# Arranque (paso a paso en README.md):
#     cp .env.example .env
#     docker compose --profile bundled up -d ollama        (+ -f docker-compose.gpu.yml si hay GPU NVIDIA)
#     docker compose --profile bundled run --rm pull-model
#     docker compose build hermes
#     docker compose run --rm hermes "hermes model"        (configurás Ollama local — SIN cuenta)
#     docker compose run --rm hermes
#
# Dos modos de funcionamiento:
#   - "bundled"  -> Ollama corre DENTRO de Docker (Windows / Linux).
#                   Usa GPU NVIDIA si hay (ver docker-compose.gpu.yml), sino CPU.
#   - "host"     -> Ollama corre NATIVO en el host (recomendado en macOS, porque
#                   Docker no puede usar la GPU Metal de Apple). Hermes le pega a
#                   http://host.docker.internal:11434/v1
# =============================================================================

services:

  # ---------------------------------------------------------------------------
  # Ollama — servidor del modelo local (solo modo "bundled").
  # Vive bajo el perfil "bundled" para que NO arranque en modo host (macOS).
  # ---------------------------------------------------------------------------
  ollama:
    profiles: ["bundled"]
    image: ollama/ollama:latest
    container_name: hermes-ollama
    environment:
      - OLLAMA_KEEP_ALIVE=${OLLAMA_KEEP_ALIVE:-24h}
      - OLLAMA_NUM_PARALLEL=${OLLAMA_NUM_PARALLEL:-1}
      - OLLAMA_MAX_LOADED_MODELS=${OLLAMA_MAX_LOADED_MODELS:-1}
      # Hermes necesita más contexto que el default de Ollama (4096, que le queda
      # chico). Lo servimos desde el SERVIDOR Ollama (no se puede por la API).
      # 32768 entra holgado en el contexto nativo de qwen3 (~40960 es su techo) y
      # es razonable en RAM. OJO: más contexto = más RAM; si andás justo de
      # memoria, bajalo en .env (ej. 8192 o 16384). Ver README.
      - OLLAMA_CONTEXT_LENGTH=${OLLAMA_CONTEXT_LENGTH:-32768}
    # Puerto de Ollama expuesto al host SOLO para debug. Comentado por defecto:
    # si ya tenés Ollama nativo escuchando en 127.0.0.1:11434 (autostart en Windows /
    # servicio systemd en Linux) este publish chocaría con
    # "Bind for 127.0.0.1:11434 failed: port is already allocated".
    # Hermes alcanza a Ollama por la red interna de Docker (http://ollama:11434/v1),
    # no por este puerto. Para debuggear, descomentá (y poné OLLAMA_HOST_PORT a un
    # puerto libre en .env si 11434 está ocupado):
    # ports:
    #   - "127.0.0.1:${OLLAMA_HOST_PORT:-11434}:11434"
    volumes:
      - ollama-models:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # pull-model — descarga OLLAMA_MODEL al volumen persistente (solo "bundled").
  # One-shot:  docker compose --profile bundled run --rm pull-model
  # ---------------------------------------------------------------------------
  pull-model:
    profiles: ["bundled"]
    image: ollama/ollama:latest
    container_name: hermes-pull-model
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen3:8b}
    entrypoint: ["/bin/sh", "-c"]
    command: ['echo ">>> Descargando modelo: $${OLLAMA_MODEL} (puede tardar varios minutos)..." && ollama pull "$${OLLAMA_MODEL}" && echo ">>> Listo."']
    restart: "no"

  # ---------------------------------------------------------------------------
  # hermes — el agente. Apunta al endpoint OpenAI-compatible de Ollama.
  # Configurar modelo local (1ra vez):  docker compose run --rm hermes "hermes model"
  #     -> elegí "Custom endpoint" y pegá la URL de Ollama (ver README). SIN cuenta.
  # Chatear:                             docker compose run --rm hermes
  # ---------------------------------------------------------------------------
  hermes:
    build:
      context: .
      dockerfile: Dockerfile.hermes
    image: hermes-agent:local
    container_name: hermes-agent
    stdin_open: true
    tty: true
    environment:
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-http://ollama:11434/v1}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-ollama}
      - HERMES_HOME=/hermes-config
      # Solo un default informativo: el modelo real lo fija el Paso 3 ("hermes
      # model" -> Custom endpoint). Deriva de OLLAMA_MODEL del .env.
      - HERMES_MODEL=${OLLAMA_MODEL:-qwen3:8b}
    extra_hosts:
      # Permite alcanzar Ollama nativo del host (modo "host" en macOS/Linux).
      - "host.docker.internal:host-gateway"
    # El flujo por defecto es 100% local y NO necesita publicar ningún puerto.
    # Solo si querés usar el portal de Nous (OPCIONAL, requiere cuenta:
    # "hermes setup --portal") hace falta exponer el callback OAuth. En ese caso
    # descomentá estas dos líneas y agregá HERMES_OAUTH_PORT=8080 en .env, y
    # corré el setup con --service-ports:
    # ports:
    #   - "127.0.0.1:${HERMES_OAUTH_PORT:-8080}:8080"
    volumes:
      - hermes-config:/hermes-config
      # Descomentar para darle a Hermes acceso a una carpeta del host:
      # - ${WORKSPACE_PATH:-./workspace}:/workspace
    working_dir: /workspace
    command: ["hermes chat"]

volumes:
  ollama-models:
    name: hermes_ollama_models
  hermes-config:
    name: hermes_agent_config
